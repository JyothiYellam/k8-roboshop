apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb
  namespace: roboshop
  labels:
    project: roboshop
    purpose: db
    component: mongodb
spec:
  replicas: 1
  selector:
    matchLabels:
      project: roboshop
      purpose: db
      component: mongodb
  template:
    metadata:
      labels:
        project: roboshop
        purpose: db
        component: mongodb
    spec:
      containers:
        - name: mongodb
          image: jyothi023/mongodb:1.0.0 
----
apiVersion: v1
kind: Service
metadata:
  name: mongodb
  namespace: roboshop
  labels:
      project: roboshop
      purpose: db
       component: mongodb
spec:
  selector: 
    project: roboshop
    tier: db
    environment: mongodb
  ports: 
   - protocol: TCP
     port: 27017
     targetPort: 27017
