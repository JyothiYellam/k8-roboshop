apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb
  namespace: roboshop
  labels:
    project: roboshop
    tier: db
    component: mongodb
spec:
  replicas: 1
  selector:
    matchLabels:
      project: roboshop
      tier: db
      component: redis
  template:
    metadata:
      labels:
        project: roboshop
        tier: db
        component: redis
    spec:
      containers:
        - name: redis
          image: redis:7.0
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: roboshop
  labels:
      project: roboshop
      tier: db
      component: monredisgodb
spec:
  selector: 
    project: roboshop
    tier: db
    component: redis
  ports: 
   - protocol: TCP
     port: 5679
     targetPort: 5679
